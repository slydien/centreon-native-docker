# OpenShift overlay
# The default `restricted-v2` SCC is used : no SCC object is created.
# External exposure through OpenShift Route (no Ingress).
#
# helm install centreon ./helm/centreon \
#   -n centreon --create-namespace \
#   -f helm/centreon/values-openshift.yaml \
#   --set route.host=centreon.apps.my-cluster.example.com

image:
  registry: ghcr.io
  repository: slydien
  # Optional : private registry pull secret
  # pullSecrets:
  #   - ghcr-pull-secret              # oc create secret docker-registry ghcr-pull-secret ...

route:
  enabled: true
  host: ""                           # empty → auto-assigned by the OpenShift router
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

ingress:
  enabled: false

# StorageClass (common on OCP with ODF / Ceph)
persistence:
  storageClass: ""                   # or "ocs-storagecluster-ceph-rbd"

mariadb:
  primary:
    persistence:
      storageClass: ""               # or "ocs-storagecluster-ceph-rbd"

# Passwords : prefer an external Secret (Conjur, External Secrets Operator...).
# See helm/centreon/README.md.
secrets:
  create: false
  existingSecret: centreon-secret    # manually created, must contain CENTREON_ADMIN_PASS
