{{- if .Values.secrets.create }}
{{- /*
The Centreon-side Secret carries :
  - CENTREON_ADMIN_PASS : web admin password (random if empty)
  - CENTREON_DB_PASS    : password of the `centreon` user in MariaDB
                          (must match .Values.mariadb.auth.password — we
                          keep them in sync here)

The MariaDB root password and storage mechanism are delegated to the
bitnami sub-chart (cf. .Values.mariadb.auth.*).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "centreon.secretName" . }}
  labels:
    {{- include "centreon.labels" . | nindent 4 }}
  annotations:
    # Helm "keep" : preserves the admin password across install / uninstall.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  CENTREON_ADMIN_PASS: {{ include "centreon.passwordOrRandom" (dict "ctx" . "value" .Values.centreon.admin.password "key" "CENTREON_ADMIN_PASS") | quote }}
  CENTREON_DB_PASS:    {{ include "centreon.passwordOrRandom" (dict "ctx" . "value" .Values.mariadb.auth.password    "key" "CENTREON_DB_PASS")    | quote }}
{{- end }}
