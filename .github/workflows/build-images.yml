name: Build & push images

# Builds the six container images and pushes them to ghcr.io.
# - Push to `main`      => tag :main + :sha-<short> (mutable)
# - Tag `v1.2.3`         => tag :1.2.3, :1.2, :latest (immutable semver)
# - PRs                  => build only (no push), used to validate the Dockerfiles
# - workflow_dispatch    => manual rebuild with a custom tag

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "images/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom tag to publish (in addition to the default ones)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - mariadb
          - centreon-broker-sql
          - centreon-broker-rrd
          - centreon-engine
          - centreon-gorgone
          - centreon-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,scope=${{ matrix.image }},mode=max
          provenance: true
          sbom:       true
