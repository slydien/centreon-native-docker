name: Build & push images

# Build strategy
# --------------
# * Tag `v24.10.27` (the canonical release trigger)
#     => CENTREON_VERSION=24.10.27 (passed as --build-arg)
#     => image tags  24.10.27, 24.10, 24, latest
#     => triggers helm-release.yml in parallel for the chart
# * Push to `main`
#     => CENTREON_VERSION = appVersion from Chart.yaml
#     => image tags  main, sha-<short>
# * Pull request
#     => same as main but no push (validation only)
# * workflow_dispatch
#     => optional custom version + extra tag

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      centreon_version:
        description: "Centreon version to build (e.g. 24.10.27). Default: Chart.yaml appVersion."
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # 1) Resolve the Centreon version
  #    - tag v24.10.27       => "24.10.27"
  #    - workflow_dispatch   => input.centreon_version (if set) else appVersion
  #    - main / PR           => appVersion from Chart.yaml
  # ---------------------------------------------------------------------------
  version:
    name: Resolve Centreon version
    runs-on: ubuntu-latest
    outputs:
      centreon_version: ${{ steps.v.outputs.centreon_version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.centreon_version }}" ]]; then
            v="${{ inputs.centreon_version }}"
          else
            v=$(awk '/^appVersion:/ {gsub(/"/,"",$2); print $2; exit}' helm/centreon/Chart.yaml)
          fi
          # Sanity check : must look like X.Y or X.Y.Z
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "ERROR: invalid version '$v'"; exit 1
          fi
          echo "centreon_version=${v}" >> "$GITHUB_OUTPUT"
          echo "Resolved Centreon version: ${v}"

  # ---------------------------------------------------------------------------
  # 2) Build the six images in parallel
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.image }}
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - mariadb
          - centreon-broker-sql
          - centreon-broker-rrd
          - centreon-engine
          - centreon-gorgone
          - centreon-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          # `latest=auto` (default) tags :latest only on the highest semver
          # seen on the registry — exactly what we want for releases.
          tags: |
            type=raw,value=${{ needs.version.outputs.centreon_version }},enable=${{ github.event_name != 'pull_request' }}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.centreon_version }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CENTREON_VERSION=${{ needs.version.outputs.centreon_version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,scope=${{ matrix.image }},mode=max
          provenance: true
          sbom:       true
