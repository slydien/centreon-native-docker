name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests : Dockerfile linting, templating sanity checks. No containers
  # required so this runs fast on every PR.
  # ---------------------------------------------------------------------------
  unit:
    name: pytest unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          sudo apt-get update && sudo apt-get install -y --no-install-recommends gettext

      - name: pytest tests/unit
        run: pytest tests/unit -v

  # ---------------------------------------------------------------------------
  # Hadolint : Dockerfile static analysis.
  # ---------------------------------------------------------------------------
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - centreon-broker-sql
          - centreon-broker-rrd
          - centreon-engine
          - centreon-gorgone
          - centreon-web
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/${{ matrix.image }}/Dockerfile
          failure-threshold: error

  # ---------------------------------------------------------------------------
  # Helm lint + template render against representative value files.
  # ---------------------------------------------------------------------------
  helm:
    name: helm lint / template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Dependency update
        run: helm dependency update helm/centreon

      - name: Lint (defaults)
        run: helm lint helm/centreon

      - name: Lint (dev overlay)
        run: helm lint helm/centreon -f helm/centreon/values-dev.yaml

      - name: Lint (openshift overlay)
        run: helm lint helm/centreon -f helm/centreon/values-openshift.yaml

      - name: Template (dev overlay)
        run: helm template centreon helm/centreon -f helm/centreon/values-dev.yaml > /tmp/dev.yaml

      - name: Template (openshift overlay)
        run: |
          helm template centreon helm/centreon \
            -f helm/centreon/values-openshift.yaml \
            --set route.host=test.apps.example.com > /tmp/ocp.yaml

      - name: Validate manifests with kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tgz -C /usr/local/bin kubeconform
          kubeconform -strict -ignore-missing-schemas -summary /tmp/dev.yaml
          kubeconform -strict -ignore-missing-schemas -summary /tmp/ocp.yaml
