name: Release Helm chart

# Packages the chart and publishes it as an OCI artifact under
# ghcr.io/<owner>/charts/centreon on every git tag matching `chart-v*`.

on:
  push:
    tags: ["chart-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version to publish (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_OWNER: ${{ github.repository_owner }}

jobs:
  release:
    name: Package & push chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.2"

      - name: Derive version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Drop the chart- prefix from the tag (chart-v0.2.0 -> 0.2.0)
            v="${GITHUB_REF_NAME#chart-v}"
            echo "version=${v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump Chart.yaml version
        run: |
          sed -i -e "s/^version: .*/version: ${{ steps.ver.outputs.version }}/" helm/centreon/Chart.yaml
          cat helm/centreon/Chart.yaml | head -5

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Dependency update
        run: helm dependency update helm/centreon

      - name: Package chart
        run: |
          mkdir -p dist
          helm package helm/centreon -d dist
          ls dist/

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: |
          helm push dist/centreon-${{ steps.ver.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.CHART_OWNER }}/charts
