# kind cluster used to validate the Centreon deployment locally.
# The "control-plane" node also acts as a worker (single-node cluster).
# extraPortMappings expose the useful service ports on the host.
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: centreon
nodes:
  - role: control-plane
    extraPortMappings:
      - { containerPort: 30080, hostPort: 30080, protocol: TCP }   # centreon-web
      - { containerPort: 30085, hostPort: 30085, protocol: TCP }   # gorgone HTTP
