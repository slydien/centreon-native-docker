# NodePort variant for vanilla Kubernetes (kind, k3s, minikube).
# OpenShift typically uses 31-service.yaml + 32-route.yaml instead.
---
apiVersion: v1
kind: Service
metadata:
  name: centreon-web
  namespace: centreon
spec:
  selector:
    app: centreon
  ports:
    - { name: http, port: 80, targetPort: 8080, nodePort: 30080 }
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: centreon-gorgone
  namespace: centreon
spec:
  selector:
    app: centreon
  ports:
    - { name: http, port: 8085, targetPort: 8085, nodePort: 30085 }
    - { name: zmq,  port: 5556, targetPort: 5556 }
  type: NodePort
