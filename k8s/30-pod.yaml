# ============================================================================
# Centreon multi-container Pod
#
# Shared volumes (emptyDir) :
#   - engine-config  : /etc/centreon-engine        (engine + gorgone)
#   - engine-rw      : /var/lib/centreon-engine/rw (engine + gorgone)
#   - broker-config  : /etc/centreon-broker        (engine + broker-sql + web)
#   - broker-data    : /var/lib/centreon-broker    (broker-sql + broker-rrd)
#
# Persistent volumes (PVC) :
#   - mariadb-data     : /var/lib/mysql            (mariadb)
#   - centreon-etc     : /etc/centreon             (web)
#   - centreon-metrics : /var/lib/centreon         (broker-rrd + web)
#   - gorgone-data     : /var/lib/centreon-gorgone (gorgone)
#
# OpenShift : no runAsUser pinned — the admission controller will apply the
# arbitrary UID from the `restricted-v2` SCC. fsGroup omitted for the same
# reason (it would be overridden). Images are prepared (chown 1001:0,
# chmod g=u) for this case.
# ============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: centreon
  namespace: centreon
  labels:
    app: centreon
spec:
  securityContext:
    fsGroupChangePolicy: OnRootMismatch
  restartPolicy: Always
  terminationGracePeriodSeconds: 60
  # Shared PID namespace : lets centreon-web SIGHUP centengine for reload
  # (see /usr/local/bin/service wrapper in the web image). Without systemd
  # or sudo in our images, this is our OpenShift-safe substitute for
  # `systemctl reload centengine`.
  shareProcessNamespace: true

  # -------- Init containers : startup order --------
  initContainers:
    - name: wait-fs
      image: registry.access.redhat.com/ubi8/ubi-minimal:8.10
      command: [sh, -c, "mkdir -p /shared/engine-rw /shared/engine-config /shared/broker-config && chmod -R g+rwxs /shared || true"]
      volumeMounts:
        - { name: engine-rw,     mountPath: /shared/engine-rw }
        - { name: engine-config, mountPath: /shared/engine-config }
        - { name: broker-config, mountPath: /shared/broker-config }
      securityContext:
        allowPrivilegeEscalation: false
        capabilities: { drop: [ALL] }
        readOnlyRootFilesystem: true

  containers:

    # ---------------------------------------------------------------- mariadb
    - name: mariadb
      image: centreon/mariadb:24.10
      imagePullPolicy: IfNotPresent
      envFrom:
        - configMapRef: { name: centreon-config }
        - secretRef:    { name: centreon-secret }
      ports:
        - { name: mysql, containerPort: 3306, protocol: TCP }
      readinessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 120
        periodSeconds: 20
        timeoutSeconds: 5
      resources:
        requests: { cpu: "500m", memory: "1Gi" }
        limits:   { cpu: "2",    memory: "2Gi" }
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities: { drop: [ALL] }
      volumeMounts:
        - { name: mariadb-data, mountPath: /var/lib/mysql }

    # ----------------------------------------------------------- broker-sql
    - name: centreon-broker-sql
      image: centreon/centreon-broker-sql:24.10
      imagePullPolicy: IfNotPresent
      envFrom:
        - configMapRef: { name: centreon-config }
        - secretRef:    { name: centreon-secret }
      env:
        - name: BROKER_DB_PASS
          valueFrom: { secretKeyRef: { name: centreon-secret, key: CENTREON_DB_PASS } }
      ports:
        - { name: bbdo-sql, containerPort: 5669, protocol: TCP }
      readinessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 20
        periodSeconds: 10
      livenessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 60
        periodSeconds: 20
      resources:
        requests: { cpu: "200m", memory: "512Mi" }
        limits:   { cpu: "1",    memory: "2Gi" }
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities: { drop: [ALL] }
      volumeMounts:
        - { name: broker-config, mountPath: /etc/centreon-broker }
        - { name: broker-data,   mountPath: /var/lib/centreon-broker }

    # ----------------------------------------------------------- broker-rrd
    - name: centreon-broker-rrd
      image: centreon/centreon-broker-rrd:24.10
      imagePullPolicy: IfNotPresent
      envFrom:
        - configMapRef: { name: centreon-config }
      ports:
        - { name: bbdo-rrd, containerPort: 5670, protocol: TCP }
      readinessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 20
        periodSeconds: 10
      livenessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 60
        periodSeconds: 20
      resources:
        requests: { cpu: "100m", memory: "256Mi" }
        limits:   { cpu: "1",    memory: "1Gi" }
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities: { drop: [ALL] }
      volumeMounts:
        - { name: centreon-metrics, mountPath: /var/lib/centreon }
        - { name: broker-data,      mountPath: /var/lib/centreon-broker }

    # --------------------------------------------------------------- engine
    - name: centreon-engine
      image: centreon/centreon-engine:24.10
      imagePullPolicy: IfNotPresent
      envFrom:
        - configMapRef: { name: centreon-config }
      readinessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 30
        periodSeconds: 10
      livenessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 60
        periodSeconds: 20
      resources:
        requests: { cpu: "500m", memory: "512Mi" }
        limits:   { cpu: "4",    memory: "2Gi" }
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities: { drop: [ALL] }
      volumeMounts:
        - { name: engine-config,  mountPath: /etc/centreon-engine }
        - { name: engine-rw,      mountPath: /var/lib/centreon-engine/rw }
        - { name: broker-config,  mountPath: /etc/centreon-broker }
        # cbmod (loaded inside centengine) needs Broker's cache_directory
        # for its .memory/.unprocessed files (local BBDO queue used while
        # broker-sql is temporarily disconnected).
        - { name: broker-data,    mountPath: /var/lib/centreon-broker }

    # -------------------------------------------------------------- gorgone
    - name: centreon-gorgone
      image: centreon/centreon-gorgone:24.10
      imagePullPolicy: IfNotPresent
      envFrom:
        - configMapRef: { name: centreon-config }
        - secretRef:    { name: centreon-secret }
      env:
        - name: CENTREON_DB_PASS
          valueFrom: { secretKeyRef: { name: centreon-secret, key: CENTREON_DB_PASS } }
      ports:
        - { name: gorgone-zmq,  containerPort: 5556, protocol: TCP }
        - { name: gorgone-http, containerPort: 8085, protocol: TCP }
      readinessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 30
        periodSeconds: 10
      livenessProbe:
        exec: { command: [/usr/local/bin/healthcheck.sh] }
        initialDelaySeconds: 90
        periodSeconds: 30
      resources:
        requests: { cpu: "200m", memory: "256Mi" }
        limits:   { cpu: "1",    memory: "1Gi" }
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities: { drop: [ALL] }
      volumeMounts:
        - { name: gorgone-data,  mountPath: /var/lib/centreon-gorgone }
        - { name: engine-rw,     mountPath: /var/lib/centreon-engine/rw }
        - { name: engine-config, mountPath: /etc/centreon-engine }

    # ----------------------------------------------------------------- web
    - name: centreon-web
      image: centreon/centreon-web:24.10
      imagePullPolicy: IfNotPresent
      envFrom:
        - configMapRef: { name: centreon-config }
        - secretRef:    { name: centreon-secret }
      env:
        - name: CENTREON_DB_PASS
          valueFrom: { secretKeyRef: { name: centreon-secret, key: CENTREON_DB_PASS } }
        - name: CENTREON_ADMIN_PASS
          valueFrom: { secretKeyRef: { name: centreon-secret, key: CENTREON_ADMIN_PASS } }
      ports:
        - { name: http, containerPort: 8080, protocol: TCP }
      readinessProbe:
        httpGet:
          path: /centreon/api/latest/platform/installation/status
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /centreon/api/latest/platform/installation/status
          port: 8080
        initialDelaySeconds: 180
        periodSeconds: 30
        timeoutSeconds: 5
      resources:
        requests: { cpu: "300m", memory: "512Mi" }
        limits:   { cpu: "2",    memory: "2Gi" }
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities: { drop: [ALL] }
      volumeMounts:
        - { name: centreon-etc,     mountPath: /etc/centreon }
        - { name: centreon-metrics, mountPath: /var/lib/centreon }
        - { name: broker-config,    mountPath: /etc/centreon-broker }
        # Centreon export : moveFiles.php copies /var/cache/centreon/config/
        # engine/<poller_id>/* to the poller's cfg_dir (= /etc/centreon-engine
        # for the "localhost" poller). We share the engine-config volume
        # with the centreon-engine container so the copy succeeds.
        - { name: engine-config,    mountPath: /etc/centreon-engine }

  volumes:
    - name: mariadb-data
      persistentVolumeClaim: { claimName: mariadb-data }
    - name: centreon-etc
      persistentVolumeClaim: { claimName: centreon-etc }
    - name: centreon-metrics
      persistentVolumeClaim: { claimName: centreon-metrics }
    - name: gorgone-data
      persistentVolumeClaim: { claimName: gorgone-data }
    # emptyDir : ephemeral volumes shared between containers in the pod
    - name: engine-config
      emptyDir: {}
    - name: engine-rw
      emptyDir: {}
    - name: broker-config
      emptyDir: {}
    - name: broker-data
      emptyDir: {}
