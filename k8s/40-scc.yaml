# ----------------------------------------------------------------------------
# OpenShift SCC — use `restricted-v2` (the default) whenever possible.
# This manifest is only useful if the cluster ships a more restrictive SCC.
# Apply as a cluster admin :
#   oc apply -f 40-scc.yaml
#   oc adm policy add-scc-to-user centreon-restricted \
#     system:serviceaccount:centreon:default
# ----------------------------------------------------------------------------
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: centreon-restricted
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
fsGroup:
  type: MustRunAs
  ranges:
    - { min: 0, max: 0 }
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - ALL
runAsUser:
  type: MustRunAsRange
  uidRangeMin: 1000
  uidRangeMax: 65535
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users: []
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
